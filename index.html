<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Night Rises by Som — CTF Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <!-- Global Decorative Elements -->
    <canvas id="matrix-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="watermark-br">SOM // DARK NIGHT RISES<br>CTF PLATFORM v1.0</div>
    <div class="watermark-side som-corner">SOM // CTF // DARK NIGHT RISES</div>

    <!-- Global Navigation -->
    <nav>
        <div class="nav-inner" style="width: 100%; display: flex; align-items: center; justify-content: space-between;">
            <a href="#/" class="nav-brand logo" style="font-family: var(--font-display); font-size: 13px; font-weight: 900; color: var(--accent); text-shadow: var(--glow); letter-spacing: 2px; text-decoration: none;">DARK NIGHT <span>RISES</span></a>
            <ul class="nav-links" style="display: flex; gap: 32px; list-style: none;">
                <li><a href="#/" class="route-link">HOME</a></li>
                <li><a href="#/challenges" class="route-link">CHALLENGES</a></li>
                <li><a href="#/scoreboard" class="route-link">SCOREBOARD</a></li>
                <li><a href="#/activity" class="route-link">ACTIVITY</a></li>
                <li><a href="#/rules" class="route-link">RULES</a></li>
                <li><a href="#/login" class="route-link">LOGIN</a></li>
            </ul>
            <div class="nav-status" style="display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: #00ff88;">
                <span class="status-dot"></span>
                SYSTEM ONLINE
            </div>
        </div>
    </nav>

    <!-- Main Content Mount Point -->
    <main id="app" style="position: relative; z-index: 10; padding-top: 64px; min-height: 100vh;"></main>

    <!-- Global Footer -->
    <footer style="position: relative; z-index: 10; border-top: 1px solid rgba(0,255,231,0.1); padding: 40px 60px; text-align: center; font-family: var(--font-mono); font-size: 11px; color: #4a6070; display: flex; justify-content: space-between; align-items: center;">
        <div class="footer-brand">DARK NIGHT RISES &nbsp;—&nbsp; <span style="color: var(--accent);">SOM</span> SECURITY LABS</div>
        <ul class="footer-links" style="display: flex; gap: 24px; list-style: none;">
            <li><a href="#/rules" style="color: var(--dim); text-decoration: none;">RULES</a></li>
            <li><a href="#/challenges" style="color: var(--dim); text-decoration: none;">CHALLENGES</a></li>
            <li><a href="#/login" style="color: var(--dim); text-decoration: none;">PORTAL</a></li>
        </ul>
        <div class="footer-som" style="color: rgba(0,255,231,0.2); letter-spacing: 4px;">// CRAFTED BY SOM //</div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
