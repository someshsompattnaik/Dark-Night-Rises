<!DOCTYPE html>

<style>
  :root {
    --bg: #030508; --bg2: #080d14; --accent: #00ffe7; --accent2: #ff003c;
    --text: #c8d8e8; --dim: #4a6070; --glow: 0 0 20px rgba(0,255,231,0.4);
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; cursor: crosshair; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,231,0.015) 2px, rgba(0,255,231,0.015) 4px); pointer-events: none; z-index: 9999; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,231,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,231,0.04) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; }
  .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,231,0.04) 0%, transparent 70%); z-index: 0; pointer-events: none; }
  .login-container { position: relative; z-index: 1; width: 420px; }
  .login-header { text-align: center; margin-bottom: 40px; }
  .login-brand { font-family: var(--font-display); font-size: 12px; color: var(--accent); letter-spacing: 4px; text-shadow: var(--glow); margin-bottom: 16px; }
  .login-title { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; margin-bottom: 8px; }
  .login-sub { font-family: var(--font-mono); font-size: 11px; color: var(--dim); letter-spacing: 2px; }
  .login-box { background: rgba(8,13,20,0.95); border: 1px solid rgba(0,255,231,0.15); padding: 40px; position: relative; box-shadow: 0 0 60px rgba(0,255,231,0.05); }
  .login-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .field-group { margin-bottom: 24px; }
  .field-label { font-family: var(--font-mono); font-size: 10px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .field-input { width: 100%; background: rgba(0,255,231,0.03); border: 1px solid rgba(0,255,231,0.15); color: var(--text); font-family: var(--font-mono); font-size: 14px; padding: 12px 16px; outline: none; transition: all 0.2s; letter-spacing: 1px; }
  .field-input:focus { border-color: var(--accent); background: rgba(0,255,231,0.05); box-shadow: var(--glow); }
  .field-input::placeholder { color: rgba(74,96,112,0.5); }
  .login-btn { width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-mono); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; padding: 14px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; margin-top: 8px; }
  .login-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; z-index: -1; }
  .login-btn:hover { color: var(--bg); }
  .login-btn:hover::before { transform: scaleX(1); }
  .login-hint { font-family: var(--font-mono); font-size: 10px; color: rgba(74,96,112,0.4); text-align: center; margin-top: 24px; letter-spacing: 2px; }
  .login-hint a { color: rgba(0,255,231,0.3); text-decoration: none; }
  .error-msg { background: rgba(255,0,60,0.1); border: 1px solid rgba(255,0,60,0.3); color: var(--accent2); font-family: var(--font-mono); font-size: 12px; padding: 10px 14px; margin-bottom: 20px; display: none; letter-spacing: 1px; }
  .success-msg { background: rgba(0,255,100,0.1); border: 1px solid rgba(0,255,100,0.3); color: #00ff88; font-family: var(--font-mono); font-size: 12px; padding: 10px 14px; margin-bottom: 20px; display: none; letter-spacing: 1px; }
  .watermark { position: fixed; bottom: 20px; right: 30px; font-family: var(--font-mono); font-size: 11px; color: rgba(0,255,231,0.15); letter-spacing: 3px; pointer-events: none; }
  .nav-back { position: fixed; top: 20px; left: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--dim); text-decoration: none; letter-spacing: 2px; transition: color 0.2s; z-index: 10; }
  .nav-back:hover { color: var(--accent); }
</style>
</head>
